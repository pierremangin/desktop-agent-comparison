<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparatif Agents IA de bureau | IA-decoded, 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Bitter:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    .bitter-<uniquifier> {
      font-family: "Bitter", serif;
      font-optical-sizing: auto;
      font-weight: <weight>;
      font-style: normal;
    }
    .raleway-<uniquifier> {
      font-family: "Raleway", sans-serif;
      font-optical-sizing: auto;
      font-weight: <weight>;
      font-style: normal;
    }
    body { margin: 0; padding: 2rem; color: #222; font-family: "Raleway"; font-size: 20px; }
    h1 { margin: 0 0 16px; text-align: center; font-family: "Bitter", serif; font-weight: 900; letter-spacing: -0.1rem; font-size: 3.5rem; }
    header { margin: 3rem auto; }
    nav { margin-bottom: 8px; text-align: center; }
    nav button {
      margin-right: 8px;
      padding: 4px;
      border: 2px solid #ccc;
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    nav button img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
    nav button.active { border-color: #333; box-shadow: 0 0 0 2px #f0f0f0, 0 0 0 4px #333; }

    table {
      border-collapse: collapse;
      border-spacing: 0;
      width: 100%;
      border: 1px solid #ddd;
    }
    th, td {
      font-weight: 300;
      text-align: center;
      padding: 14px;
    }
    th:first-child, td:first-child {
      text-align: left;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    .fa-check  { color: green; }
    .fa-remove { color: red; }
    .muted     { color: #aaa; }

    thead th[data-id] { cursor: pointer; vertical-align: bottom; }
    thead th[data-id]:hover { background-color: #e8f0fe; }

    .table-scroll { overflow-x: auto; }
    .tool-name { font-weight: 600; display: block; margin-bottom: 8px; }
    .tool-logo { display: block; width: 48px; height: 48px; margin: 8px auto 0; object-fit: contain; }
    .editor    { display: block; color: #666; font-size: 0.85em; font-weight: normal; }

    #empty-msg {
      padding: 48px 16px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccc;
      border-radius: 8px;
    }
    #empty-msg.hidden { display: none; }

    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #overlay.hidden { display: none; }
    #overlay-panel {
      background: #fff;
      padding: 24px;
      max-width: 640px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 8px;
      position: relative;
    }
    #overlay-close {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none;
      font-size: 20px; cursor: pointer;
    }
    #overlay-content section { margin-top: 16px; }
    #overlay-content h3 { margin: 0 0 4px; font-size: 1em; color: #555; }
    #table-footer a { color: #999; text-decoration: none; }
    #table-footer a:hover { color: #333; text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1 id="page-title">Comparatif Agents IA de bureau - Mai 2026</h1>
    <nav id="lang-switcher">
      <button data-lang="fr" class="active"><img src="assets/flags/fr.svg" alt="Français"></button>
      <button data-lang="en"><img src="assets/flags/en.svg" alt="English"></button>
      <button data-lang="es"><img src="assets/flags/es.svg" alt="Español"></button>
      <button data-lang="de"><img src="assets/flags/de.svg" alt="Deutsch"></button>
      <button data-lang="it"><img src="assets/flags/it.svg" alt="Italiano"></button>
      <button data-lang="nl"><img src="assets/flags/nl.svg" alt="Nederlands"></button>
      <button data-lang="ru"><img src="assets/flags/ru.svg" alt="Русский"></button>
      <button data-lang="hi"><img src="assets/flags/hi.svg" alt="हिन्दी"></button>
      <button data-lang="pt"><img src="assets/flags/pt.svg" alt="Português"></button>
      <button data-lang="ja"><img src="assets/flags/ja.svg" alt="日本語"></button>
      <button data-lang="ko"><img src="assets/flags/ko.svg" alt="한국어"></button>
      <button data-lang="zh"><img src="assets/flags/zh.svg" alt="中文"></button>
    </nav>
  </header>

  <div class="table-scroll">
    <table id="tools-table">
      <!-- thead + tbody injectés par app.js -->
    </table>
  </div>

  <div id="table-footer" style="text-align: center; color: #999; font-size: 0.85em; margin-top: 16px;"></div>

  <div id="empty-msg" class="hidden"></div>

  <!-- OVERLAY -->
  <div id="overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="overlay-panel">
      <button id="overlay-close" aria-label="Fermer">✕</button>
      <div id="overlay-content">
        <!-- contenu injecté par app.js -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
